[window]
dimensions = { columns = 80, lines = 24 }

[font]
normal = { family = "MonoLisa Variable", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 13.0

[colors]
draw_bold_text_with_bright_colors = true

# Gruvbox dark color scheme
[colors.primary]
foreground = "#ebdbb2"
background = "#282828"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[colors.search]
matches = { foreground = "CellBackground", background = "#fabd2f" }
focused_match = { foreground = "CellBackground", background = "#fe8019" }
